<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Drop shadow under the capsule: a crisp line right at the card's bottom edge + a soft fade
       below it. Same width as the card (no left/right/top peek) so those margins stay a clean GAP
       to the focus frame. Card = the cover (imageRelativeScale 0.91, centered). The cover is drawn
       on top of this by the grid; backgroundColor must be ffffffff so these colours render untinted. -->
  <rect x="9" y="23.5"  width="182" height="273" fill="#000000" fill-opacity="0.03"/>
  <rect x="9" y="21"    width="182" height="273" fill="#000000" fill-opacity="0.06"/>
  <rect x="9" y="18.5"  width="182" height="273" fill="#000000" fill-opacity="0.10"/>
  <rect x="9" y="16"    width="182" height="273" fill="#000000" fill-opacity="0.14"/>
  <rect x="9" y="286.5" width="182" height="4"   fill="#000000" fill-opacity="0.28"/>
  <rect x="9" y="13.5"  width="182" height="273" fill="#1a222d"/>
</svg>

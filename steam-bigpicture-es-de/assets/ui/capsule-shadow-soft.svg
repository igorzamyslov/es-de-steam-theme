<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Drop shadow from the BOTTOM and RIGHT: card-shaped dark rects offset down+right, mostly
       hidden under the card and peeking at the bottom/right edges (soft fade + a crisp near layer).
       Top and left stay clean (the gap to the focus frame). Card = the cover (0.91, centered).
       backgroundColor must be ffffffff so these colours render untinted. -->
  <rect x="15"   y="19.5" width="182" height="273" fill="#000000" fill-opacity="0.04"/>
  <rect x="13"   y="17.5" width="182" height="273" fill="#000000" fill-opacity="0.08"/>
  <rect x="11.5" y="16"   width="182" height="273" fill="#000000" fill-opacity="0.14"/>
  <rect x="11"   y="15.5" width="182" height="273" fill="#000000" fill-opacity="0.22"/>
  <rect x="9"    y="13.5" width="182" height="273" fill="#1a222d"/>
</svg>

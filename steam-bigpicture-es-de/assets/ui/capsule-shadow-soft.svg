<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 221">
  <!-- Combined shadow: a SOFT ambient halo all around the box (6 concentric layers with a
       smooth opacity falloff, faking blur since LunaSVG can't) + a CRISP directional band on
       the bottom-left (one hard offset rect). Card (matching the cover, imageRelativeScale 0.91,
       centered) is drawn last on top. All confined to the cell margin (backgroundRelativeScale
       caps at 1). backgroundColor must be ffffffff so these colours render untinted. -->

  <!-- soft ambient halo: outer (faint) -> inner (stronger), centered on the card. Lightened. -->
  <rect x="-0.36" y="0.95"  width="192.72" height="219.11" fill="#000000" fill-opacity="0.02"/>
  <rect x="1.84"  y="3.15"  width="188.32" height="214.71" fill="#000000" fill-opacity="0.035"/>
  <rect x="3.64"  y="4.95"  width="184.72" height="211.11" fill="#000000" fill-opacity="0.05"/>
  <rect x="5.24"  y="6.55"  width="181.52" height="207.91" fill="#000000" fill-opacity="0.07"/>
  <rect x="6.64"  y="7.95"  width="178.72" height="205.11" fill="#000000" fill-opacity="0.09"/>
  <rect x="7.64"  y="8.95"  width="176.72" height="203.11" fill="#000000" fill-opacity="0.11"/>

  <!-- crisp directional band, offset to BOTTOM-RIGHT (hard edge), ~1px smaller -->
  <rect x="11.14" y="12.95" width="174.72" height="201.11" fill="#000000" fill-opacity="0.32"/>

  <!-- card (matches the cover) -->
  <rect x="8.64"  y="9.95"  width="174.72" height="201.11" fill="#1a222d"/>
</svg>

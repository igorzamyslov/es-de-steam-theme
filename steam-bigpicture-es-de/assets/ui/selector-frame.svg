<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Focus frame positioned for an EVEN gap to the cover. The cover (imageRelativeScale 0.91,
       centered) spans viewBox x9-191 / y13.5-286.5. This frame sits a uniform 4 viewBox units
       outside it on all sides; because the viewBox is 2:3 (same as the cell) and the selector is
       drawn at the full cell (selectorRelativeScale 1.0), 4 units = the same pixels on every side. -->
  <rect x="5" y="9.5" width="190" height="281"
        fill="none" stroke="#d6dee6" stroke-opacity="0.92" stroke-width="2.6"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Concentric focus frame: a simple edge-aligned rect drawn at selectorRelativeScale 0.95 of
       the cell. Because both the cover (imageRelativeScale 0.91) and this frame are uniform
       fractions of the cell, they always share the SAME aspect ratio (on any device aspect) -
       so the white border matches the cover's shape. The gap is proportional (slightly larger
       top/bottom in px), kept small. -->
  <rect x="1.3" y="1.3" width="197.4" height="297.4"
        fill="none" stroke="#d6dee6" stroke-opacity="0.92" stroke-width="2.6"/>
</svg>

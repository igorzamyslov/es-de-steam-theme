<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 221">
  <!-- Steam-style focus frame: a single thin light-grey rounded outline drawn at the CELL
       edge. The capsule image sits at ~0.93 of the cell, so this frame floats just OUTSIDE
       the art with a small gap. No glow, no halo - one crisp hairline. -->
  <rect x="1.25" y="1.25" width="189.5" height="218.5"
        fill="none" stroke="#d6dee6" stroke-opacity="0.92" stroke-width="2.5"/>
</svg>

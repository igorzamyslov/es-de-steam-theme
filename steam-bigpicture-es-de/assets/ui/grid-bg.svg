<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="none">
  <!-- Steam Big Picture library backdrop: dark desaturated blue-grey, subtle top->bottom gradient (NOT black) -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c2531"/>
      <stop offset="1" stop-color="#141a23"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
</svg>
